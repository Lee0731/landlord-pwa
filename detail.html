<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>房间详情</title>
  <link rel="stylesheet" href="detail.css" />
</head>
<body class="page-enter">

  <!-- 顶栏 -->
  <nav class="detail-nav">
    <button class="nav-back" id="btnBack">
      <svg width="10" height="18" viewBox="0 0 10 18" fill="none"><path d="M9 1L1 9l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>返回</span>
    </button>
    <div class="nav-info">
      <span class="nav-title" id="navTitle">501</span>
      <span class="nav-building" id="navBuilding">村前大道</span>
    </div>
    <span class="nav-status badge vacant" id="navStatus">空置</span>
  </nav>

  <!-- 内容 -->
  <main class="detail-content">

    <!-- 基本信息 -->
    <section class="card">
      <div class="card-header">基本信息</div>
      <div class="field">
        <label>租户姓名</label>
        <input type="text" id="tenantName" placeholder="输入姓名" autocomplete="off" />
      </div>
      <div class="field">
        <label>联系电话</label>
        <input type="tel" id="tenantPhone" placeholder="输入电话" autocomplete="off" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>月租 (元)</label>
          <input type="number" id="rentAmount" placeholder="月租" inputmode="decimal" />
        </div>
        <div class="field">
          <label>起租日期</label>
          <input type="date" id="rentStart" />
        </div>
      </div>
      <div class="field">
        <label>备注</label>
        <textarea id="rentNote" rows="2" placeholder="备注…"></textarea>
      </div>
    </section>

    <!-- 身份证照片 -->
    <section class="card">
      <div class="card-header">身份证照片</div>
      <!-- 正面 -->
      <div class="id-col">
        <div class="id-slot" id="idFront" data-side="front">
          <input type="file" accept="image/*" hidden />
          <div class="id-placeholder">
            <svg class="id-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="11" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M15 9h3M15 12h3M15 15h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span>点击拍摄人像面</span>
          </div>
          <img class="id-preview" id="idFrontImg" alt="身份证正面" />
        </div>
        <div class="id-actions">
          <button class="id-btn" id="btnDownFront" disabled>下载</button>
          <button class="id-btn" id="btnReplFront">更换</button>
        </div>
      </div>
      <!-- 反面 -->
      <div class="id-col" style="margin-top:10px;">
        <div class="id-slot" id="idBack" data-side="back">
          <input type="file" accept="image/*" hidden />
          <div class="id-placeholder">
            <svg class="id-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 10h10M7 13h10M7 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span>点击拍摄国徽面</span>
          </div>
          <img class="id-preview" id="idBackImg" alt="身份证反面" />
        </div>
        <div class="id-actions">
          <button class="id-btn" id="btnDownBack" disabled>下载</button>
          <button class="id-btn" id="btnReplBack">更换</button>
        </div>
      </div>
    </section>

    <!-- 水费 -->
    <section class="card">
      <div class="card-header">
        <span>水费</span>
        <span class="card-unit">按吨计费</span>
      </div>
      <div class="meter-grid">
        <div class="field">
          <label>单价 (元/吨)</label>
          <input type="number" id="waterPrice" placeholder="如 5" inputmode="decimal" />
        </div>
        <div class="field">
          <label>上月读数</label>
          <input type="number" id="waterPrev" placeholder="上月底" inputmode="decimal" />
        </div>
        <div class="field">
          <label>本月读数</label>
          <input type="number" id="waterCurr" placeholder="本月底" inputmode="decimal" />
        </div>
      </div>
      <div class="meter-result" id="waterResult">
        <span class="meter-usage">用量 <b>--</b> 吨</span>
        <span class="meter-cost">费用 <b>¥ --</b></span>
      </div>
      <button class="btn-roll" id="btnRollWater">⏎ 结转下月</button>
    </section>

    <!-- 电费 -->
    <section class="card">
      <div class="card-header">
        <span>电费</span>
        <span class="card-unit">按度计费</span>
      </div>
      <div class="meter-grid">
        <div class="field">
          <label>单价 (元/度)</label>
          <input type="number" id="elecPrice" placeholder="如 1.2" inputmode="decimal" />
        </div>
        <div class="field">
          <label>上月读数</label>
          <input type="number" id="elecPrev" placeholder="上月底" inputmode="decimal" />
        </div>
        <div class="field">
          <label>本月读数</label>
          <input type="number" id="elecCurr" placeholder="本月底" inputmode="decimal" />
        </div>
      </div>
      <div class="meter-result" id="elecResult">
        <span class="meter-usage">用量 <b>--</b> 度</span>
        <span class="meter-cost">费用 <b>¥ --</b></span>
      </div>
      <button class="btn-roll" id="btnRollElec">⏎ 结转下月</button>
    </section>

    <!-- 押金 -->
    <section class="card">
      <div class="card-header">押金记录</div>
      <div class="field-row">
        <div class="field">
          <label>押金金额 (元)</label>
          <input type="number" id="depositAmount" placeholder="押金" inputmode="decimal" />
        </div>
        <div class="field">
          <label>收取日期</label>
          <input type="date" id="depositDate" />
        </div>
      </div>
      <div class="field">
        <label>押金备注</label>
        <input type="text" id="depositNote" placeholder="如：押二付一" autocomplete="off" />
      </div>
    </section>

    <!-- 收租提醒 -->
    <section class="card">
      <div class="card-header">收租提醒</div>
      <div class="remind-row">
        <label>每月提醒日</label>
        <div class="day-picker">
          <select id="remindDay">
            <option value="0">关闭</option>
          </select>
        </div>
      </div>
      <p class="remind-hint">开启后，每月选定日期将推送收租提醒。后台推送仅 Chrome 浏览器支持。</p>
    </section>

    <!-- 月度汇总 -->
    <section class="card card-summary">
      <div class="card-header">本月账单</div>
      <div class="summary-lines">
        <div class="summary-line">
          <span>房租</span>
          <span id="sumRent">¥ 0.00</span>
        </div>
        <div class="summary-line">
          <span>水费</span>
          <span id="sumWater">¥ 0.00</span>
        </div>
        <div class="summary-line">
          <span>电费</span>
          <span id="sumElec">¥ 0.00</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-line summary-total">
          <span>合计</span>
          <span id="sumTotal">¥ 0.00</span>
        </div>
      </div>
      <div class="summary-actions">
        <button class="btn btn-paid" id="btnPaid">标记已付</button>
        <button class="btn btn-share" id="btnShare">分享账单</button>
      </div>
    </section>

    <!-- 底部操作 -->
    <div class="footer-actions">
      <button class="btn btn-delete" id="btnDelete">清空数据</button>
      <button class="btn btn-save" id="btnSave">保存</button>
    </div>

  </main>

  <!-- 图片全屏查看 -->
  <div class="img-viewer" id="imgViewer">
    <div class="img-viewer-header">
      <button class="img-viewer-close" id="imgViewerClose">完成</button>
    </div>
    <div class="img-viewer-body">
      <img id="imgViewerSrc" alt="查看图片" />
    </div>
    <div class="img-viewer-actions">
      <button class="btn-va" id="imgDownload">下载</button>
      <button class="btn-va" id="imgReplace">更换</button>
    </div>
  </div>

  <!-- 调试日志 -->
  <div class="debug-panel">
    <div class="debug-header" id="debugToggle">日志 ▾</div>
    <div class="debug-body" id="debugBody"></div>
  </div>

  <!-- 登录遮罩 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-title">房东管家</div>
      <div class="login-sub">登录以同步数据</div>
      <input type="email" id="loginEmail" placeholder="邮箱" autocomplete="email" />
      <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password" />
      <div class="login-err" id="loginErr"></div>
      <button class="login-btn" id="loginBtn">登录</button>
    </div>
  </div>

  <script src="supabase.min.js"></script>
  <script src="auth.js"></script>
  <script src="db.js"></script>
  <script src="detail.js"></script>
</body>
</html>
